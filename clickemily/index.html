<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../style.css">
    <title>Click Emily</title></head>
<body>
    <button id="clickBtn" class="btn-action">Click :3333</button>
    <script>
        const triggerId = 2;
        document.getElementById('clickBtn').addEventListener('click', () => {
            localStorage.setItem('click_trigger', JSON.stringify({id: triggerId, time: Date.now()}));
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

<body>

    <div class="app-window">
        <button id="clickBtn" class="btn-action">Click :3</button>
        <div id="statusLbl" class="lbl-status"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const LISTENER_URL = "https://unfancied-siegeable-jude.ngrok-free.dev/click";
        const AUTO_REMOTE_URL = "https://autoremotejoaomgcd.appspot.com/sendmessage";

        // WARNING: Your API key is visible in client-side code. 
        // This is fine for personal use, but risky if you publish this site.
        const PAYLOAD_DATA = {
            "key": "c9f-IOZniHs:APA91bFBIX-ehMJ8PC3F_g1wAYrL6yRl_YlwWcmcsBArZ0VSxa9PBzP2WoPXgaE22cXCX-na-gwNMEb3zUdsVRNrtuu4sBdNfFQwP7h5Fm_n40FJIRuBFn4",
            "message": "ck",
            "password": "clicker"
        };

        const btn = document.getElementById('clickBtn');
        const statusLbl = document.getElementById('statusLbl');

        btn.addEventListener('click', async () => {
            // 1. Update UI
            btn.innerText = "Sending...";
            btn.setAttribute('disabled', 'true');
            statusLbl.innerText = "Clicking...";

            const timestamp = Date.now();
            
            // --- METHOD A: AutoRemote (GET) ---
            const arParams = new URLSearchParams(PAYLOAD_DATA);
            arParams.append("_t", timestamp);
            
            const reqAutoRemote = fetch(`${AUTO_REMOTE_URL}?${arParams.toString()}`, { 
                method: 'GET', 
                mode: 'no-cors' 
            }).catch(e => console.warn("AR Fail:", e));


            // --- METHOD B: Ngrok Direct (POST Bypass) ---
            // Strategy: We send a POST request. Ngrok usually only shows the 
            // warning page for GET requests from browsers.
            // We put data in URL AND Body to be safe.
            
            const ngrokUrl = new URL(LISTENER_URL);
            // Append params to URL (in case server reads query params)
            Object.keys(PAYLOAD_DATA).forEach(key => ngrokUrl.searchParams.append(key, PAYLOAD_DATA[key]));
            ngrokUrl.searchParams.append("_t", timestamp);

            const reqNgrok = fetch(ngrokUrl, {
                method: 'POST', // POST bypasses Ngrok Interstitial Warning
                mode: 'no-cors', // Bypasses CORS (Browser won't block the send)
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: arParams // Send data in body too
            }).catch(e => console.warn("Ngrok Fail:", e));


            // 3. Reset UI
            // We await the fetch calls. Even if they return "opaque" (error-like) responses
            // due to no-cors, the request has left the building.
            await Promise.all([reqAutoRemote, reqNgrok]);
            
            setTimeout(() => {
                btn.innerText = "Click :3";
                btn.removeAttribute('disabled');
                statusLbl.innerText = "Clicked!";
                console.log("Requests sent.");
            }, 300);
        });
    </script>

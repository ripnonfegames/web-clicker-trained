<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* --- THEME --- */
        :root {
            --bg-color: #1a1a1a;
            --btn-color: #1f6aa5;
            --btn-hover: #144870;
            --text-color: #ffffff;
            --status-color: #808080;
        }

        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-color);
            user-select: none;
        }

        .app-window {
            width: 320px;
            height: 200px;
            background-color: var(--bg-color);
            border: 1px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-action {
            background-color: var(--btn-color);
            color: white;
            border: none;
            width: 220px;
            height: 56px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-action:hover { background-color: var(--btn-hover); transform: translateY(-1px); }
        .btn-action:active { transform: translateY(1px); }
        .btn-action:disabled { background-color: #3a3a3a; color: #888; cursor: not-allowed; transform: none; }

        .lbl-status {
            margin-top: 15px;
            font-size: 11px;
            color: var(--status-color);
            text-align: center;
        }
    </style>
</head>

</body>
</html>
